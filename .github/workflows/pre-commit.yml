name: pre-commit

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Run pre-commit
      uses: pre-commit/action@v3.0.1
